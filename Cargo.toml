[package]
name = "collector"
version = "0.5.10"
edition = "2021"
description = "Personal item collection cataloguing app"

[[bin]]
name = "collector"
path = "src/main.rs"

[dependencies]
slint = "1.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.6", features = ["v4"] }
dirs = "5.0"
rfd = "0.14"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp", "gif"] }

[build-dependencies]
slint-build = "1.8"
