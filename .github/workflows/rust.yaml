name: Build
# Build Tauri bundles for Windows, macOS, and Linux.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_installer: Collectors-Notebook-windows-x86_64.msi
            asset_portable: Collectors-Notebook-windows-x86_64-portable.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: Collectors-Notebook-macos-arm64.dmg
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: Collectors-Notebook-macos-x86_64.dmg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: Collectors-Notebook-linux-x86_64.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \\
            libwebkit2gtk-4.1-dev build-essential curl wget file \\
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install tauri-cli
        run: |
          cargo binstall tauri-cli --version "^2" --locked --no-confirm \\
            || cargo install tauri-cli --version "^2" --locked
          cargo tauri --version

      - name: Build bundles (Windows / MSI)
        if: runner.os == 'Windows'
        run: cargo tauri build --target ${{ matrix.target }} --bundles msi

      - name: Build bundles (macOS / Linux)
        if: runner.os != 'Windows'
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Stage (Linux AppImage)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}"

      - name: Stage (macOS dmg)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg "dist/${{ matrix.asset }}"

      # The MSI is named "Collector's Notebook_3.0.0_x64_en-US.msi" — the
      # apostrophe broke the previous glob copy silently, so nothing landed in
      # dist/ and the release had no Windows asset. Resolve the file via
      # Get-ChildItem (handles the apostrophe as data, not a quote) and FAIL
      # LOUDLY if it isn't found instead of uploading nothing.
      - name: Stage (Windows installer + portable exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $msi = Get-ChildItem -LiteralPath "src-tauri/target/${{ matrix.target }}/release/bundle/msi" -Filter *.msi | Select-Object -First 1
          if (-not $msi) { Write-Error "No MSI found in bundle/msi"; exit 1 }
          Copy-Item -LiteralPath $msi.FullName -Destination "dist/${{ matrix.asset_installer }}"
          $exe = "src-tauri/target/${{ matrix.target }}/release/collectors-notebook.exe"
          if (-not (Test-Path -LiteralPath $exe)) { Write-Error "Portable exe missing"; exit 1 }
          Copy-Item -LiteralPath $exe -Destination "dist/${{ matrix.asset_portable }}"
          Get-ChildItem dist   # log what we staged

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
