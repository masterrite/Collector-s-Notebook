name: Build
# Build Tauri bundles for Windows, macOS, and Linux.
#
# Triggers:
#   - push to main / PR: builds all (CI check)
#   - push a version tag v*: builds all AND attaches bundles to a Release
#
# IMPORTANT: this workflow REPLACES the original pre-Tauri one. The old file
# ran `cargo build` and never installed tauri-cli — it only "worked" when a
# stale cache happened to still contain the CLI. This version installs the CLI
# explicitly every run (see "Install tauri-cli"), so `cargo tauri` is always
# present regardless of cache state.
#
# Prereq committed to the repo: src-tauri/icons/ (run `cargo tauri icon` once
# locally and commit) — the macOS/Windows bundlers hard-require icon.icns/.ico.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_installer: Collectors-Notebook-windows-x86_64.msi
            asset_portable: Collectors-Notebook-windows-x86_64-portable.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: Collectors-Notebook-macos-arm64.dmg
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: Collectors-Notebook-macos-x86_64.dmg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: Collectors-Notebook-linux-x86_64.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      # Tauri v2 Linux stack (webview + tray/rsvg). Replaces the old
      # winit/GTK3 list entirely.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # Install the Tauri CLI EXPLICITLY, every run. binstall grabs a prebuilt
      # binary in seconds; the `|| cargo install` fallback compiles it if no
      # prebuilt exists for the platform, so this step can't silently no-op.
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install tauri-cli
        run: |
          cargo binstall tauri-cli --version "^2" --locked --no-confirm \
            || cargo install tauri-cli --version "^2" --locked
          cargo tauri --version   # fail loudly here if it's somehow missing

      # Windows: WiX MSI (NSIS 3.11 breaks Tauri's installer template).
      - name: Build bundles (Windows / MSI)
        if: runner.os == 'Windows'
        run: cargo tauri build --target ${{ matrix.target }} --bundles msi

      - name: Build bundles (macOS / Linux)
        if: runner.os != 'Windows'
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Stage (Linux AppImage)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}"

      - name: Stage (macOS dmg)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg "dist/${{ matrix.asset }}"

      - name: Stage (Windows installer + portable exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi" "dist/${{ matrix.asset_installer }}"
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/collectors-notebook.exe" "dist/${{ matrix.asset_portable }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
