name: Build
# Build Tauri bundles for Windows, macOS, and Linux.
#
# Triggers:
#   - on every push to main / pull request: builds all (CI check)
#   - on pushing a version tag like v1.0.0: builds all AND attaches
#     the bundles to a GitHub Release.
#
# Ship vehicles per platform (what `cargo tauri build` produces):
#   Windows: NSIS installer (*-setup.exe) + the portable exe
#   macOS:   .dmg (proper .app inside — no hand-rolled Info.plist needed)
#   Linux:   AppImage (self-contained; a raw binary would need system webkit)
#
# Requirements committed to the repo:
#   - src-tauri/icons/ must contain the full icon set (run `cargo tauri icon`
#     once locally and commit it) — the macOS/Windows bundlers hard-require it.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_installer: Collectors-Notebook-windows-x86_64-setup.exe
            asset_portable: Collectors-Notebook-windows-x86_64-portable.exe
          - os: macos-latest
            target: aarch64-apple-darwin        # Apple Silicon (M1+)
            asset: Collectors-Notebook-macos-arm64.dmg
          - os: macos-15-intel
            target: x86_64-apple-darwin          # Intel Macs
            asset: Collectors-Notebook-macos-x86_64.dmg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: Collectors-Notebook-linux-x86_64.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache cargo registry + build output. NOTE: target/ lives under
      # src-tauri now, and the lockfile hashed is src-tauri/Cargo.lock.
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      # Tauri v2 Linux stack: webview + tray/menu/rsvg support. This replaces
      # the old winit/fontconfig list entirely.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # Prebuilt CLI in seconds (compiling tauri-cli would cost ~10 minutes).
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install tauri-cli
        run: cargo binstall tauri-cli --locked --no-confirm

      - name: Build bundles
        run: cargo tauri build --target ${{ matrix.target }}

      # -- Stage: rename Tauri's versioned bundle names to stable asset names --
      - name: Stage (Linux AppImage)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}"

      - name: Stage (macOS dmg)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg "dist/${{ matrix.asset }}"

      - name: Stage (Windows installer + portable exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe" "dist/${{ matrix.asset_installer }}"
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/collectors-notebook.exe" "dist/${{ matrix.asset_portable }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
